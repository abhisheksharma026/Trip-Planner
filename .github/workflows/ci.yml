name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint
        run: python -m ruff check --select E9,F63,F7,F82 trip_planner app.py tests

      - name: Run tests
        run: python -m pytest -v tests/test_auth_security.py tests/test_session_memory.py tests/test_redis_debug.py
